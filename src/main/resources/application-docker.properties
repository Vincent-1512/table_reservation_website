# File cấu hình riêng khi chạy trên Docker (được kích hoạt bởi SPRING_PROFILES_ACTIVE=docker)
# Ghi đè cấu hình kết nối Database để trỏ về container MySQL (tên là 'db') thay vì 'localhost'
spring.datasource.url=jdbc:mysql://db:3306/web_dat_ban?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Server configuration for Docker
server.port=8081

# Hibernate configuration (giữ nguyên ddl-auto=update)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
