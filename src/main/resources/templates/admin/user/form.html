<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo tài khoản - Lumina Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        .form-card {
            max-width: 760px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        .form-actions {
            margin-top: 22px;
            display: flex;
            gap: 10px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        @media (max-width: 800px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<div class="admin-layout">
    <div class="sidebar">
        <h2>Lumina Admin</h2>

        <a th:href="@{/admin/reports}">Dashboard</a>
        <a th:href="@{/admin/menu}">Quản lý Thực đơn</a>
        <a th:href="@{/admin/tables}">Quản lý Bàn/Khu vực</a>
        <a th:href="@{/admin/reservations}">Quản lý Đặt bàn</a>
        <a th:href="@{/admin/users}" class="active">Quản lý Người dùng</a>
        <a th:href="@{/admin/orders}">Lịch sử Hóa đơn</a>
        <a th:href="@{/admin/payments}">Quản lý Thanh toán</a>

        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit"
                    style="background:none; border:none; cursor:pointer; font-family:inherit; font-weight:500;
                           display:block; color:#a0a0a0; text-decoration:none; padding:12px 15px;
                           margin-bottom:10px; border-radius:8px; transition:0.3s; font-size:16px;">
                Đăng xuất
            </button>
        </form>
    </div>

    <div class="main-content">
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="card form-card">
            <div class="card-header">
                <h3>Tạo tài khoản mới</h3>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại</a>
            </div>

            <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập *</label>
                        <input id="username"
                               type="text"
                               th:field="*{username}"
                               required
                               maxlength="50">
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu *</label>
                        <input id="password"
                               type="password"
                               th:field="*{password}"
                               required
                               minlength="6"
                               maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="fullName">Họ tên *</label>
                        <input id="fullName"
                               type="text"
                               th:field="*{fullName}"
                               required
                               maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="role">Vai trò *</label>
                        <select id="role" th:field="*{role}" required>
                            <option th:each="r : ${roles}"
                                    th:value="${r}"
                                    th:text="${r}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input id="phone"
                               type="text"
                               th:field="*{phone}"
                               maxlength="20">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email"
                               type="email"
                               th:field="*{email}"
                               maxlength="100">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Tạo tài khoản</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
