<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh mục món ăn - Lumina Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        .form-container {
            max-width: 720px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #cba876;
            box-shadow: 0 0 0 3px rgba(203, 168, 118, 0.15);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .hint {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>
<div class="admin-layout">
    <div class="sidebar">
        <h2>Lumina Admin</h2>

        <a th:href="@{/admin/reports}">Dashboard</a>
        <a th:href="@{/admin/menu}" class="active">Quản lý Thực đơn</a>
        <a th:href="@{/admin/tables}">Quản lý Bàn/Khu vực</a>
        <a th:href="@{/admin/reservations}">Quản lý Đặt bàn</a>
        <a th:href="@{/admin/users}">Quản lý Người dùng</a>
        <a th:href="@{/admin/orders}">Lịch sử Hóa đơn</a>
        <a th:href="@{/admin/payments}">Quản lý Thanh toán</a>

        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit"
                    style="background:none; border:none; cursor:pointer; font-family:inherit; font-weight:500;
                           display:block; color:#a0a0a0; text-decoration:none; padding:12px 15px;
                           margin-bottom:10px; border-radius:8px; transition:0.3s; font-size:16px;">
                Đăng xuất
            </button>
        </form>
    </div>

    <div class="main-content">
        <div class="card form-container">
            <div class="card-header">
                <h3 th:text="${category.id == null ? 'Thêm danh mục' : 'Cập nhật danh mục'}">
                    Thêm danh mục
                </h3>

                <a th:href="@{/admin/menu}" class="btn btn-secondary">
                    Quay lại
                </a>
            </div>

            <form th:action="@{/admin/menu/category/save}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="name">Tên danh mục *</label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           required
                           placeholder="Ví dụ: Món chính, Khai vị, Tráng miệng">
                    <span class="hint">Tên danh mục nên ngắn gọn, dễ hiểu.</span>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả</label>
                    <textarea id="description"
                              th:field="*{description}"
                              placeholder="Mô tả ngắn về nhóm món ăn này..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        Lưu danh mục
                    </button>

                    <a th:href="@{/admin/menu}" class="btn btn-secondary">
                        Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
