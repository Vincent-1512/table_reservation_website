<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>In Hóa Đơn - Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .invoice-box {
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            font-size: 14px;
            line-height: 24px;
            font-family: 'Outfit', sans-serif;
            color: #555;
            background: #fff;
        }
        .invoice-box table {
            width: 100%;
            line-height: inherit;
            text-align: left;
            border-collapse: collapse;
        }
        .invoice-box table td {
            padding: 5px;
            vertical-align: top;
        }
        .invoice-box table tr.top table td {
            padding-bottom: 20px;
        }
        .invoice-box table tr.top table td.title {
            font-size: 28px;
            line-height: 35px;
            color: #333;
            font-weight: 700;
            text-align: center;
        }
        .invoice-box table tr.information table td {
            padding-bottom: 40px;
        }
        .invoice-box table tr.heading td {
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
        }
        .invoice-box table tr.item td {
            border-bottom: 1px solid #eee;
        }
        .invoice-box table tr.item.last td {
            border-bottom: none;
        }
        .invoice-box table tr.total td:last-child {
            border-top: 2px solid #eee;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        @media print {
            body {
                background: none;
                padding: 0;
            }
            .invoice-box {
                box-shadow: none;
                border: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body onload="window.print()">
    <div class="invoice-box">
        <table cellpadding="0" cellspacing="0">
            <tr class="top">
                <td colspan="4">
                    <table>
                        <tr>
                            <td class="title">
                                LUMINA
                            </td>
                        </tr>
                        <tr>
                            <td class="text-center">
                                HÓA ĐƠN THANH TOÁN<br>
                                Mã Hóa Đơn: #<span th:text="${order.id}">1</span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <tr class="information">
                <td colspan="4">
                    <table>
                        <tr>
                            <td>
                                <strong>Bàn:</strong> <span th:text="${order.table.tableName}">Bàn 01</span><br>
                                <strong>Nhân viên:</strong> <span th:text="${order.user.fullName}">Nguyễn Văn A</span>
                            </td>
                            <td class="text-right">
                                <strong>Giờ vào:</strong> <span th:text="${#temporals.format(order.createdAt, 'HH:mm dd/MM/yyyy')}">10:00</span><br>
                                <strong th:if="${payment != null}">Giờ ra:</strong> <span th:if="${payment != null}" th:text="${#temporals.format(payment.createdAt, 'HH:mm dd/MM/yyyy')}">11:00</span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <tr class="heading">
                <td>Tên món</td>
                <td class="text-center">SL</td>
                <td class="text-right">Đơn giá</td>
                <td class="text-right">Thành tiền</td>
            </tr>

            <tr class="item" th:each="item : ${orderItems}">
                <td th:text="${item.menuItem.name}">Tên món</td>
                <td class="text-center" th:text="${item.quantity}">1</td>
                <td class="text-right" th:text="${#numbers.formatDecimal(item.priceAtTime, 0, 'COMMA', 0, 'POINT')}">0</td>
                <td class="text-right" th:text="${#numbers.formatDecimal(item.priceAtTime * item.quantity, 0, 'COMMA', 0, 'POINT')}">0</td>
            </tr>

            <tr class="total">
                <td colspan="3" class="text-right"><strong>Tổng cộng:</strong></td>
                <td class="text-right" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
            </tr>
            
            <tr th:if="${payment != null}">
                <td colspan="4" class="text-center" style="padding-top: 30px;">
                    Phương thức thanh toán: 
                    <span th:switch="${payment.method.name()}">
                        <span th:case="'CASH'">Tiền mặt</span>
                        <span th:case="'CARD'">Thẻ</span>
                        <span th:case="'E_WALLET'">Ví điện tử</span>
                        <span th:case="'BANK_TRANSFER'">Chuyển khoản</span>
                    </span>
                    <br>
                    <strong>Cảm ơn quý khách và hẹn gặp lại!</strong>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
