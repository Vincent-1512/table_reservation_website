<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sơ đồ Bàn - Lumina Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .table-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-weight: 500;
        }
        .summary-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-available    { background: #51cf66; }
        .dot-occupied     { background: #ff6b6b; }
        .dot-reserved     { background: #fcc419; }
        .dot-maintenance  { background: #adb5bd; }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .table-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 5px solid #ccc;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .table-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .table-card h4 { margin: 0 0 8px 0; font-size: 18px; }
        .table-card p { margin: 0 0 12px 0; color: #666; font-size: 13px; }
        .status-AVAILABLE  { border-top-color: #51cf66; }
        .status-OCCUPIED   { border-top-color: #ff6b6b; }
        .status-PENDING    { border-top-color: #fcc419; }
        .status-RESERVED   { border-top-color: #fcc419; }
        .status-MAINTENANCE{ border-top-color: #adb5bd; }
        .status-label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/staff-layout :: sidebar('tables')}"></div>

        <div class="main-content">
            <div th:replace="~{fragments/staff-layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <h3>🪑 Sơ đồ / Trạng thái Bàn</h3>
                </div>

                <!-- Legend / Summary -->
                <div class="table-summary">
                    <div class="summary-item">
                        <span class="summary-dot dot-available"></span>
                        <span>Trống: <strong th:text="${availableCount}">0</strong></span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-dot dot-occupied"></span>
                        <span>Đang dùng: <strong th:text="${occupiedCount}">0</strong></span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-dot dot-reserved"></span>
                        <span>Đã đặt: <strong th:text="${reservedCount}">0</strong></span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-dot dot-maintenance"></span>
                        <span>Bảo trì: <strong th:text="${maintenanceCount}">0</strong></span>
                    </div>
                </div>

                <!-- Filter -->
                <form th:action="@{/staff/tables}" method="get" class="filter-bar">
                    <div class="form-group">
                        <label>Lọc theo trạng thái</label>
                        <select name="statusFilter" class="form-control">
                            <option value="">-- Tất cả --</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                    th:selected="${selectedStatus != null and selectedStatus == s.name()}">STATUS</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="height:40px;">Lọc</button>
                    <a th:href="@{/staff/tables}" class="btn btn-secondary" style="height:40px; line-height:20px;">Xóa lọc</a>
                </form>

                <!-- Table Grid -->
                <div class="table-grid">
                    <div th:each="table : ${tables}"
                         class="table-card"
                         th:classappend="'status-' + ${table.status.name()}">
                        <h4 th:text="${table.tableName}">Bàn 01</h4>
                        <p th:text="${table.area.name} + ' · ' + ${table.capacity} + ' người'">Tầng 1 · 4 người</p>

                        <!-- AVAILABLE: Mở bàn mới -->
                        <div th:if="${table.status.name() == 'AVAILABLE'}">
                            <span class="status-label" style="color:#51cf66;">⬤ Trống</span>
                            <form th:action="@{/staff/orders/create}" method="post">
                                <input type="hidden" name="tableId" th:value="${table.id}" />
                                <button type="submit" class="btn btn-primary" style="width:100%; padding:8px;">Mở Bàn</button>
                            </form>
                        </div>

                        <!-- OCCUPIED: Link tới order -->
                        <div th:if="${table.status.name() == 'OCCUPIED'}">
                            <span class="status-label" style="color:#ff6b6b;">⬤ Đang phục vụ</span>
                            <a th:if="${activeOrderByTable != null and activeOrderByTable[table.id] != null}"
                               th:href="@{'/staff/orders/' + ${activeOrderByTable[table.id].id}}"
                               class="btn btn-primary" style="width:100%; padding:8px; display:inline-block;">
                                Xem Order →
                            </a>
                            <span th:unless="${activeOrderByTable != null and activeOrderByTable[table.id] != null}"
                                  style="font-size:12px; color:#888;">Đang xử lý...</span>
                        </div>

                        <!-- RESERVED: Khách đến -->
                        <div th:if="${table.status.name() == 'RESERVED'}">
                            <span class="status-label" style="color:#fcc419;">⬤ Đã đặt trước</span>
                            <form th:action="@{/staff/orders/create}" method="post">
                                <input type="hidden" name="tableId" th:value="${table.id}" />
                                <button type="submit" class="btn btn-warning"
                                        style="width:100%; padding:8px;"
                                        onclick="return confirm('Mở bàn cho khách đến?')">Khách Đến</button>
                            </form>
                        </div>

                        <!-- MAINTENANCE -->
                        <div th:if="${table.status.name() == 'MAINTENANCE'}">
                            <span class="status-label" style="color:#adb5bd;">⬤ Bảo trì</span>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(tables)}" style="text-align:center; color:#999; padding:40px;">
                    Không có bàn nào phù hợp với bộ lọc.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
