<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử Đặt Bàn - Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .container { max-width: 1000px; margin: 120px auto 50px auto; padding: 40px; background: var(--glass-bg); border-radius: 15px; border: 1px solid var(--glass-border); }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        .table th, .table td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table th { color: var(--primary); font-weight: 600; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-PENDING { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-CONFIRMED { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-COMPLETED { background: rgba(23, 162, 184, 0.2); color: #17a2b8; }
        .status-CANCELLED { background: rgba(220, 53, 69, 0.2); color: #dc3545; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Lumina</a>
        <div class="nav-links">
            <a href="/">Trang chủ</a>
            <a href="/menu">Thực đơn</a>
            <a href="/reservation">Đặt bàn</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="text-align:center; margin-bottom: 30px;">Lịch sử Đặt Bàn của bạn</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table class="table">
            <thead>
                <tr>
                    <th>Mã Đặt bàn</th>
                    <th>Thời gian đến</th>
                    <th>Số khách</th>
                    <th>Khu vực / Bàn</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="res : ${reservations}">
                    <td th:text="'#RES-' + ${res.id}">#RES-1</td>
                    <td th:text="${#temporals.format(res.reservationTime, 'HH:mm - dd/MM/yyyy')}">10:00 20/10/2026</td>
                    <td th:text="${res.numberOfGuests} + ' người'">2 người</td>
                    <td th:text="${res.table.area.name} + ' - ' + ${res.table.tableName}">Tầng 1 - Bàn 01</td>
                    <td>
                        <span th:class="'status-badge status-' + ${res.status.name()}" th:text="${res.status}">PENDING</span>
                    </td>
                    <td>
                        <form th:if="${res.status.name() == 'PENDING'}" th:action="@{/reservation/cancel}" method="post" style="margin:0;">
                            <input type="hidden" name="reservationId" th:value="${res.id}">
                            <button type="submit" class="btn-primary" style="background:#ff4757; color:#fff; padding:5px 10px; font-size:12px; width:auto;" onclick="return confirm('Bạn có chắc chắn muốn hủy đặt bàn này?');">Hủy bàn</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reservations)}">
                    <td colspan="6" style="text-align:center; color:#aaa;">Bạn chưa có lịch sử đặt bàn nào.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
