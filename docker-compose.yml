version: '3.8'

services:
  app:
    build: .
    container_name: restaurant_app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - restaurant-network


  db:
    image: mysql:8.0
    container_name: restaurant_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=web_dat_ban
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
    networks:
      - restaurant-network

  

volumes:
  db_data:

networks:
  restaurant-network:
    driver: bridge
